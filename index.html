<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-theme="light">
  <div class="wrapper">
    <div class="title-row">
      <h1 class="game-title">TETRIS</h1>
      <button id="theme-toggle" title="Cambiar tema" aria-label="Cambiar tema claro/oscuro">🌙</button>
    </div>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>

        <div id="new-highscore-form" class="new-highscore-form hidden">
          <span class="label">¡Nuevo récord!</span>
          <div class="name-entry-row">
            <input id="name-input" type="text" maxlength="12" placeholder="Tu nombre" autocomplete="off" />
            <button id="save-score-btn">Guardar</button>
          </div>
        </div>

        <div id="highscore-panel" class="highscore-panel">
          <span class="label">RÉCORDS</span>
          <ol id="highscore-list" class="highscore-list"></ol>
          <div class="best-stats">
            <span>Mejor combo: <strong id="best-combo-val">0</strong></span>
            <span>Máx. líneas: <strong id="max-lines-val">0</strong></span>
          </div>
          <button id="reset-scores-btn" class="reset-scores-btn">Resetear récords</button>
        </div>

        <button id="restart-btn">Reiniciar</button>
      </div>
    </div>

    <div id="start-screen" class="overlay">
      <div class="overlay-box">
        <p id="start-title">TETRIS</p>

        <div class="highscore-panel">
          <span class="label">RÉCORDS</span>
          <ol id="start-highscore-list" class="highscore-list"></ol>
          <div class="best-stats">
            <span>Mejor combo: <strong id="start-best-combo-val">0</strong></span>
            <span>Máx. líneas: <strong id="start-max-lines-val">0</strong></span>
          </div>
          <button id="start-reset-scores-btn" class="reset-scores-btn">Resetear récords</button>
        </div>

        <button id="start-play-btn">Jugar</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
